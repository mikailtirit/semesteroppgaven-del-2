{% extends "base.html" %}

{% block title %}Favorites{% endblock %}

{% block content %}

<div class="favorites-container">

    <h1>My Favorite Movies 🎬</h1>

    {% for movie in movies %}
        <div class="favorite-card">
            <p>{{ movie.movie_title }}</p>
        </div>
    {% endfor %}

    <a href="/dashboard">
        <button>Back</button>
    </a>

</div>

{% endblock %}
