<html>
<head>
    <title>My App</title>
</head>
<body>

{% if user %}

    <h1>Welcome {{ user }}</h1>

    <a href="/logout">
        <button>Logout</button>
    </a>

{% else %}

    <h1>Welcome to My App</h1>
    <p>Please login or register to continue</p>

    <a href="/login">
        <button>Get Started</button>
    </a>

{% endif %}

</body>
</html>
